services:
  app:
    build: ./docker/php
    container_name: yii2_app
    volumes:
      - ./:/home/andrew/PhpstormProjects/yii2-test
    working_dir: /home/andrew/PhpstormProjects/yii2-test
    depends_on:
      - db
    environment:
      - YII_DEBUG=1
      - YII_ENV=dev

  db:
    image: mysql:8.0
    container_name: yii2_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yii2_test
      MYSQL_USER: yii2
      MYSQL_PASSWORD: yii2
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  nginx:
    image: nginx:alpine
    container_name: yii2_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/home/andrew/PhpstormProjects/yii2-test
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  db_data: